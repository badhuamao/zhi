name: Single_Yang_Retrace

on:
  schedule:
    # 每天北京时间 16:30 自动运行 (UTC 8:30)
    - cron: '30 8 * * *'
  push:
    paths:
      - 'Single_Yang_Retrace.py'
      - '.github/workflows/Single_Yang_Retrace.yml'
  workflow_dispatch: # 支持手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install pandas numpy

      - name: Run Screening Script
        # 这里确保执行的是你最新的那个“双模排序版”脚本名
        run: python Single_Yang_Retrace.py

      - name: Commit and Push Results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 检查是否有 CSV 结果生成或数据更新
          git add .
          
          # 只有在有变化时才提交，防止 workflow 报错
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "自动更新选股名单: $(date +'%Y-%m-%d %H:%M') [强势型优先/剔除6天]"
            git push
          else
            echo "没有发现符合战法的新个股，无需更新。"
          fi
